<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Email Signature Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body style="font-family:'Manrope', Arial, sans-serif; padding:20px;">

<h2>Signature Generator</h2>

<div style="margin-bottom:20px;">
  <input id="name" placeholder="Name" style="display:block; margin-bottom:10px; padding:8px; width:300px;">
  <input id="position" placeholder="Position" style="display:block; margin-bottom:10px; padding:8px; width:300px;">
  <input id="phone" placeholder="Phone" style="display:block; margin-bottom:10px; padding:8px; width:300px;">
  
  <button onclick="generate()">Generate</button>
</div>

<hr>

<div id="result" style="margin-top:20px;"></div>

<script>
function generate() {
  const name = document.getElementById("name").value;
  const position = document.getElementById("position").value;
  const phone = document.getElementById("phone").value;

  document.getElementById("result").innerHTML = `
<table cellpadding="0" cellspacing="0" style="border-collapse:collapse; max-width:600px; font-family:'Manrope', Arial, sans-serif;">

  <tr>
    <td style="font-size:36px; font-weight:700; color:#383E42; padding-bottom:6px; line-height:49px;">
      ${name}
    </td>
  </tr>

  <tr>
    <td style="font-size:18px; font-weight:600; color:#676E72; padding-bottom:20px; line-height:25px;">
      ${position}
    </td>
  </tr>

  <tr>
    <td style="padding-bottom:20px;">
      
      <table cellpadding="0" cellspacing="0" style="display:inline-block; border:1px solid #AECBED; border-radius:20px; padding:6px 12px; margin-right:8px;">
        <tr>
          <td style="vertical-align:middle;">
            <img src="https://dmitrekon.github.io/sites/PHONE.png" width="18" style="display:block;">
          </td>
          <td style="font-size:18px; font-weight:600; color:#676E72; padding-left:6px;">
            ${phone}
          </td>
        </tr>
      </table>

      <table cellpadding="0" cellspacing="0" style="display:inline-block; border:1px solid #AECBED; border-radius:20px; padding:6px 12px;">
        <tr>
          <td style="vertical-align:middle;">
            <img src="https://dmitrekon.github.io/sites/WEB.png" width="18" style="display:block;">
          </td>
          <td style="font-size:18px; font-weight:600; color:#676E72; padding-left:6px;">
            www.mnozhyna.foundation
          </td>
        </tr>
      </table>

    </td>
  </tr>

  <tr>
    <td>
      <img src="https://dmitrekon.github.io/sites/LOGO3.png" width="200" style="display:block;">
    </td>
  </tr>

</table>
  `;
}
</script>

</body>
</html>
